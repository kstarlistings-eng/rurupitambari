services:
  postgres:
    image: postgres:16-alpine
    container_name: pitambari-postgres
    environment:
      POSTGRES_USER: pitambari
      POSTGRES_PASSWORD: pitambari
      POSTGRES_DB: pitambari
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitambari -d pitambari"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
