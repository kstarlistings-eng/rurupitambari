services:
  - type: web
    name: ruru-pitambari-api
    runtime: node
    region: singapore
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard with your Supabase connection string
      - key: FRONTEND_URL
        sync: false # Set this to your deployed Vercel frontend URL
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRY
        value: "15m"
      - key: REFRESH_TOKEN_EXPIRY
        value: "7d"
